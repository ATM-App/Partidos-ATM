<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATM LIVE - Partidos en Vivo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="firebase.js"></script>
    <style>
        .public-header { background: #1C2C5B; padding: 15px; text-align: center; border-bottom: 3px solid #D12229; color: white; }
        .no-match-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; padding: 20px; }
        .live-badge-public { background: #D12229; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        
        /* Ajuste para que la cronología sea deslizable */
        .crono-container-public {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            background: #f8fafc;
        }
    </style>
</head>
<body class="light-theme">

    <div id="pantalla-espera" class="no-match-panel" style="display: none;">
        <img src="ESCUDO ATM.png" style="width: 120px; margin-bottom: 20px; opacity: 0.8;">
        <h2 id="nombre-equipo-espera" style="color: #1C2C5B;">Cargando equipo...</h2>
        <p style="color: #64748b;">No hay ningún partido en curso en este momento.</p>
        <div style="margin-top: 20px; font-size: 0.8rem; color: #D12229; font-weight: bold;">
            <i class="fa-solid fa-clock-rotate-left"></i> El marcador se actualizará automáticamente al iniciar el partido.
        </div>
    </div>

    <div id="pantalla-viva" style="display: none;">
        <header class="public-header">
            <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 10px;">
                <img src="ESCUDO ATM.png" style="width: 40px;">
                <div class="live-badge-public">EN VIVO</div>
            </div>
            <div style="display: flex; justify-content: center; align-items: center; gap: 20px;">
                <div style="text-align: right;"><div style="font-size: 0.8rem; opacity: 0.8;">ATM</div><div id="live-score-atm" style="font-size: 2.5rem; font-weight: 900;">0</div></div>
                <div style="font-size: 1.5rem; opacity: 0.5;">VS</div>
                <div style="text-align: left;"><div id="live-rival-name" style="font-size: 0.8rem; opacity: 0.8;">RIVAL</div><div id="live-score-rival" style="font-size: 2.5rem; font-weight: 900;">0</div></div>
            </div>
            <div id="live-timer-public" style="color: #F1C40F; font-weight: bold; font-size: 1.2rem; margin-top: 5px;">00:00</div>
            <div id="live-status-public" style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7;">PREVIO</div>
        </header>

        <div class="pitch-wrapper" style="height: 45vh; min-height: 320px; margin: 15px auto; width: 95%; max-width: 500px; position: relative; overflow: hidden; border-radius: 12px; border: 2px solid #2ECC71; background: #22c55e;">
            <div class="pitch-lines">
                <div class="center-line"></div><div class="center-circle"></div>
                <div class="penalty-area left"><div class="goal-area"></div></div>
                <div class="penalty-area right"><div class="goal-area"></div></div>
            </div>
            <div class="pitch" id="contenedor-campo-publico" style="pointer-events: none;"></div>
        </div>

        <div style="padding: 15px;">
            <h4 style="color: #1C2C5B; border-bottom: 2px solid #D12229; padding-bottom: 5px; margin-bottom: 10px; font-family: 'Montserrat', sans-serif;">
                <i class="fa-solid fa-bolt"></i> Sucesos del Partido
            </h4>
            <div class="crono-container-public">
                <ul id="cronologia-publica" style="list-style: none; padding: 0; margin: 0;"></ul>
            </div>
        </div>
    </div>

    <script src="live.js"></script>
</body>
</html>
